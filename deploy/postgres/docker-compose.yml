services:
  postgres:
    image: postgres:16-alpine
    container_name: fyp_ontology_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fyp_ontology}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fyp_ontology_dev_password}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fyp_ontology_pgdata:/var/lib/postgresql/data
      - ./init/02_schema_and_seed.sql:/docker-entrypoint-initdb.d/02_schema_and_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fyp_ontology_pgdata:
